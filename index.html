}function drawDonut(canvasId, segs) {
  var c = document.getElementById(canvasId); if (!c) return;
  var dpr = window.devicePixelRatio || 1;
  var size = 100;
  var cx = size/2, cy = size/2, r = 30, lw = 10;
  c.width = size * dpr; c.height = size * dpr;
  c.style.width = size + 'px'; c.style.height = size + 'px';
  var ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  var tot = segs.reduce(function(s,x) { return s + x.v; }, 0) || 1;

  // Store segment angles for hit testing
  var segAngles = [];
  var start = -Math.PI/2;
  segs.forEach(function(s) {
    if (s.v === 0) { segAngles.push(null); return; }
    var a = s.v / tot * 2 * Math.PI;
    segAngles.push({ start: start, end: start + a, c: s.c, l: s.l, v: s.v });
    start += a;
  });

  // Draw function
  function draw(hoverIdx) {
    ctx.clearRect(0, 0, size, size);
    segAngles.forEach(function(seg, i) {
      if (!seg) return;
      ctx.beginPath(); ctx.arc(cx, cy, r, seg.start, seg.end);
      ctx.lineWidth = hoverIdx === i ? lw + 4 : lw;
      ctx.strokeStyle = seg.c;
      ctx.shadowColor = hoverIdx === i ? 'rgba(0,0,0,0.2)' : 'transparent';
      ctx.shadowBlur = hoverIdx === i ? 8 : 0;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // Center text
    if (hoverIdx !== null && hoverIdx >= 0 && segAngles[hoverIdx]) {
      var s = segAngles[hoverIdx];
      ctx.fillStyle = '#0f172a'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(s.v + '条', cx, cy + 2);
      ctx.fillStyle = '#64748b'; ctx.font = '9px sans-serif';
      ctx.fillText(s.l, cx, cy + 16);
    } else {
      ctx.fillStyle = '#0f172a'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(tot + '', cx, cy + 2);
      ctx.fillStyle = '#64748b'; ctx.font = '9px sans-serif';
      ctx.fillText('总计', cx, cy + 16);
    }
  }

  draw(-1);

  // Hover interaction
  c.onmousemove = function(e) {
    var rect = c.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (size / rect.width);
    var my = (e.clientY - rect.top) * (size / rect.height);
    var dx = mx - cx, dy = my - cy;
    var dist = Math.sqrt(dx*dx + dy*dy);

    // Only trigger inside the ring
    if (dist < r - lw || dist > r + lw) { draw(-1); return; }

    var angle = Math.atan2(dy, dx);
    if (angle < -Math.PI/2) angle += 2 * Math.PI;

    var found = -1;
    segAngles.forEach(function(seg, i) {
      if (!seg) return;
      var sa = seg.start, ea = seg.end;
      if (sa < -Math.PI/2 && angle > Math.PI) angle -= 2*Math.PI;
      if (angle >= sa && angle <= ea) found = i;
    });
    draw(found);
  };

  c.onmouseleave = function() { draw(-1); };
}

function drawTrendChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 40;
  const h = 150;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Group tickets by creation date
  const dayMap = {};
  tickets.forEach(t => {
    const d = t.createdDate;
    dayMap[d] = (dayMap[d] || 0) + 1;
  });

  // Get June 1-24 range
  const days = [];
  for (let i = 1; i <= 24; i++) {
    const d = '2026-06-' + String(i).padStart(2, '0');
    days.push({ date: d.slice(5), count: dayMap[d] || 0 });
  }

  const pad = { top: 10, right: 15, bottom: 25, left: 30 };
  const ch = 150 - pad.top - pad.bottom;
  const cw = w - pad.left - pad.right;
  const maxVal = Math.max(1, ...days.map(d => d.count));
  const barW = Math.max(2, cw / days.length - 2);

  // Grid lines
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (ch / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#94a3b8'; ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * (3 - i) / 3), pad.left - 6, y + 3);
  }

  // Bars
  days.forEach((d, i) => {
    const x = pad.left + i * (cw / days.length) + 1;
    const h = (d.count / maxVal) * ch;
    const y = pad.top + ch - h;
    ctx.fillStyle = d.count > 0 ? '#3b82f6' : '#e2e8f0';
    ctx.fillRect(x, y, barW, Math.max(h, 1));

    // X labels every 5 days
    if (i % 5 === 0 || i === days.length - 1) {
      ctx.fillStyle = '#94a3b8'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(d.date.replace('06-', ''), x + barW/2, pad.top + ch + 14);
    }
  });
}

// ====== Debounced Search ======
var _debounceTimer = null;
function debouncedRender() {
  if (_debounceTimer) clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(function() { render(); }, 300);
}

// ====== Keyboard Shortcuts ======
document.addEventListener('keydown', function(e) {
  // Don't trigger when typing in input/textarea
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  if (e.key === '/') {
    e.preventDefault();
    document.getElementById('filterSearch').focus();
  } else if (e.key === 'Escape') {
    document.querySelectorAll('.ticket-detail.show').forEach(d => d.classList.remove('show'));
    document.querySelectorAll('.expand-arrow.open').forEach(i => i.classList.remove('open'));
    allExpanded = false;
    document.getElementById('expandAllBtn').textContent = '📂 全部展开';
  } else if (e.key === 'n' && e.ctrlKey) {
    e.preventDefault();
    showNewTicketModal();
  }
});

// ====== Back to Top ======
window.addEventListener('scroll', function() {
  const btn = document.getElementById('backToTop');
  if (!btn) return;
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

// Restore theme
(function() {
  if (localStorage.getItem('kanban-theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    const tb = document.getElementById('themeBtn');
    if (tb) tb.innerHTML = '☀️ 亮色';
  }
})();

// ====== Notification ======
let notifyTimer = null;
function notify(msg, type) {
  const bar = document.getElementById('notifyBar');
  if (!bar) return;
  bar.textContent = msg;
  bar.className = 'notify-bar show ' + (type || 'info');
  if (notifyTimer) clearTimeout(notifyTimer);
  notifyTimer = setTimeout(() => { bar.classList.remove('show'); }, 4000);
}

// ====== Auto-Poll tickets.json (every 5 min) ======
let lastDataHash = '';
let pollInterval = null;
let overdueInterval = null;

function startPolling() {
  lastDataHash = JSON.stringify(tickets.map(t => ({ id: t.id, status: t.status, solutions: t.solutions.map(s => ({ step: s.step, status: s.status })) })));

  pollInterval = setInterval(() => {
    fetch('tickets.json?_=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const newHash = JSON.stringify(data.tickets.map(t => ({ id: t.id, status: t.status, solutions: t.solutions.map(s => ({ step: s.step, status: s.status })) })));
        if (newHash !== lastDataHash) {
          data.tickets.forEach(remote => {
            const local = tickets.find(t => t.id === remote.id);
            if (!local) { tickets.push(remote); notify('📥 新工单: ' + remote.id, 'success'); }
            else if (remote.updatedDate > local.updatedDate) Object.assign(local, remote);
          });
          detectOverdue(); render(); renderDashboard();
          lastDataHash = newHash;
          notify('🔄 数据已同步', 'info');
        }
      }).catch(() => {});
  }, 5 * 60 * 1000);

  overdueInterval = setInterval(() => {
    var before = JSON.stringify(tickets.map(function(t) { return { id: t.id, status: t.status, hasOverdue: t._hasOverdue, overdueCount: t._overdueCount, solStatuses: t.solutions.map(function(s) { return s.status; }) }; }));
    detectOverdue(); checkAutoClose();
    var after = JSON.stringify(tickets.map(function(t) { return { id: t.id, status: t.status, hasOverdue: t._hasOverdue, overdueCount: t._overdueCount, solStatuses: t.solutions.map(function(s) { return s.status; }) }; }));
    if (before !== after) { render(); renderDashboard(); }
  }, 60 * 1000);

  // Polling indicator
  const meta = document.getElementById('lastUpdated');
  if (meta && pollInterval) {
    const txt = meta.textContent;
    meta.innerHTML = '<span class="polling-dot live"></span>实时监控中 · ' + txt.replace('更新于 ', '');
  }
}

function checkAutoClose() {
  let changed = false;
  tickets.forEach(t => {
    if (t.status === 'resolved' || t.status === 'closed') return;
    if (t.solutions.length > 0 && t.solutions.every(s => s.status === 'done')) {
      t.status = 'resolved'; t.updatedDate = new Date().toISOString();
      const nowStr = new Date().toISOString().slice(5,10).replace('-','/') + ' ' + new Date().toTimeString().slice(0,5);
      t.timeline.push({ time: nowStr, event: '🤖 自动完结：所有方案已完成' });
      t.progress = (t.progress||'') + '\n' + nowStr + ' 系统自动完结。';
      changed = true; notify('🎉 ' + t.id + ' 自动完结', 'success');
    }
  });
  if (changed) { detectOverdue(); saveChanges(); render(); renderDashboard(); }
}

// Restore
(function() {
  const saved = localStorage.getItem('kanban-v3');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (Array.isArray(data)) {
        // New format: full ticket array — merge into defaults (user edits win)
        const dataMap = {};
        data.forEach(function(t) { dataMap[t.id] = t; });
        // Overwrite default tickets that have saved versions
        tickets.forEach(function(t) {
          if (dataMap[t.id]) { var s = dataMap[t.id]; Object.assign(t, s); delete dataMap[t.id]; }
        });
        // Add any new tickets not in defaults
        var newTickets = Object.values(dataMap);
        if (newTickets.length) { tickets = newTickets.concat(tickets); }
      } else {
        // Old format: { id: { status, priority } } — backward compatibility
        tickets.forEach(function(t) {
          if (data[t.id]) {
            if (data[t.id].status) t.status = data[t.id].status;
            if (data[t.id].priority) t.priority = data[t.id].priority;
          }
        });
      }
    } catch(e) { /* ignore corrupt data */ }
  }
})();
initData();
startPolling();

</script>
